name: Release

on:
  push:
    tags:
      # Core module release tags only (the hf module's
      # extensions/vectorize/hf/v* tags don't match this pattern and
      # publish no binaries).
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    name: Build and publish rvl binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
