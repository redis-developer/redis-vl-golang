name: Deploy Docs

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build and Deploy Docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set release version in docs
        run: |
          VERSION=$(grep -o 'Version = "[^"]*"' version.go | cut -d'"' -f2)
          echo "Setting documentation version to $VERSION"
          sed -i "s/display_version: '.*'/display_version: '$VERSION'/" docs/content/antora.yml
          sed -i "s/redisvl-version: '.*'/redisvl-version: '$VERSION'/" docs/content/antora.yml

      - name: Install Antora
        working-directory: docs
        run: npm install --no-audit --no-fund

      - name: Build documentation
        working-directory: docs
        run: npx antora --stacktrace antora-playbook.yml

      - name: Add .nojekyll file
        run: touch docs/build/site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "docs/build/site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
