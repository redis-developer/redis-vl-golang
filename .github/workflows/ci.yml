name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  core:
    name: Core module
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "gofmt needs to be run on:" && echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      # Includes the integration suite: internal/redistest starts a
      # redis:8.8.0 testcontainer automatically (Docker is preinstalled
      # on ubuntu-latest runners).
      - name: Test (unit + integration)
        run: go test -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: |
          {
            echo "## Test coverage"
            echo '```'
            go tool cover -func=coverage.out | tail -1
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage profile
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache-dependency-path: |
            go.sum
            extensions/vectorize/hf/go.sum

      # Lint the hf module against this checkout's core module.
      - name: Set up multi-module workspace
        run: go work init . ./extensions/vectorize/hf

      - name: Lint core module
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      - name: Lint hf module
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: extensions/vectorize/hf

  hf:
    name: HF module (cgo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache-dependency-path: |
            go.sum
            extensions/vectorize/hf/go.sum

      # Test the hf module against the core module from this checkout
      # (not the released version) so cross-module changes are validated
      # together.
      - name: Set up multi-module workspace
        run: go work init . ./extensions/vectorize/hf

      - name: Vet
        working-directory: extensions/vectorize/hf
        run: go vet ./...

      # Unit tests only: live tests (model download + onnxruntime shared
      # library) are gated behind RUN_HF_LIVE_TESTS and skip here.
      - name: Test
        working-directory: extensions/vectorize/hf
        run: go test ./...
